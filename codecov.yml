coverage:
  status:
    project:
      default:
        target: 95%
        threshold: 1%
    patch:
      default:
        target: 80%

ignore:
  - tests/
  # Live-API verification harnesses (round-trip + conformance smokes). They are
  # exercised by running them against the real Copilot backend, not by `bun test`,
  # so unit-coverage of these files is not meaningful — treat like test infra.
  - scripts/smoke/
