# Dependabot configuration for automated security updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Let a release age before proposing it, so upstream regressions surface
    # in the wider ecosystem first. 2 weeks for minor/patch; a month for
    # majors (breaking bumps like typescript 6->7 deserve extra soak time).
    cooldown:
      default-days: 14
      semver-major-days: 30
    # Group all minor/patch updates together
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "typescript"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "typescript"
        update-types:
          - "minor"
          - "patch"
    # Open PRs for security updates immediately
    open-pull-requests-limit: 10
    # Assignees for dependency PRs
    assignees:
      - "ignaciohermosillacornejo"
    # Labels for dependency PRs
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Same 2-week stability cooldown as npm (see above).
    cooldown:
      default-days: 14
      semver-major-days: 30
    # Assignees for workflow PRs
    assignees:
      - "ignaciohermosillacornejo"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
