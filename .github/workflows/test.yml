name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run type checking
        run: bun run typecheck

      - name: Run linting
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: License check (production deps)
        # Stages package.json only (NOT package-lock.json) and runs
        # npm install --omit=dev to mirror scripts/pack-mcpb.ts exactly, so
        # the gate measures the same graph that ships in the .mcpb bundle.
        # The nested quotes in --excludePackages are intentional: inside $(...)
        # bash opens a fresh shell-quoting scope, so the inner "..." is its own
        # context and does not conflict with the outer quoting.
        run: |
          mkdir -p .license-check
          cp package.json .license-check/
          (cd .license-check && npm install --omit=dev --ignore-scripts --no-audit --no-fund)
          npx --yes license-checker@latest \
            --start .license-check \
            --production \
            --onlyAllow 'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0' \
            --excludePackages "copilot-money-mcp@$(node -p "require('./package.json').version")" \
            --summary

  unit-tests:
    name: Unit Tests
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests with coverage
        run: bun test --coverage --coverage-reporter=lcov tests/unit tests/models tests/core tests/utils

      - name: Upload unit test coverage to Codecov
        if: (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push') && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  e2e-tests:
    name: E2E Tests
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run E2E tests with coverage
        run: bun test --coverage --coverage-reporter=lcov tests/e2e tests/tools tests/integration

      - name: Upload E2E test coverage to Codecov
        if: (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push') && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
